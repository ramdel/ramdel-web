name: Conventional Commits

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  check-title:
    name: Check PR title format
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            ci
            infra
            sec
            test
            perf
            style
            build
            revert
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: |
            Subject must start lowercase, be in imperative mood, and not end with a period.
